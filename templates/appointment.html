{% extends "base.html" %}

{% block title %}Book an Appointment | Oyil Boutique{% endblock %}

{% block content %}
<div class="bg-brand-ivory py-20">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16 fade-in">
            <h1 class="text-5xl font-serif mb-4">Book a Fitting</h1>
            <p class="text-gray-500 font-light">Experience the height of luxury at our boutique. Schedule your personalized styling session.</p>
        </div>

        <div class="bg-white p-10 md:p-14 shadow-sm border border-brand-champagne fade-in">
            <form action="/book-appointment" method="POST" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label for="name" class="block text-sm uppercase tracking-widest text-brand-charcoal mb-2">Full Name</label>
                        <input type="text" id="name" name="name" required class="w-full bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-brand-gold transition-colors font-light text-brand-charcoal">
                    </div>
                    <div>
                        <label for="email" class="block text-sm uppercase tracking-widest text-brand-charcoal mb-2">Email Address</label>
                        <input type="email" id="email" name="email" required class="w-full bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-brand-gold transition-colors font-light text-brand-charcoal">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label for="phone" class="block text-sm uppercase tracking-widest text-brand-charcoal mb-2">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required class="w-full bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-brand-gold transition-colors font-light text-brand-charcoal">
                    </div>
                    <div>
                        <label for="date_requested" class="block text-sm uppercase tracking-widest text-brand-charcoal mb-2">Preferred Date</label>
                        <input type="date" id="date_requested" name="date_requested" required class="w-full bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-brand-gold transition-colors font-light text-gray-500">
                    </div>
                </div>

                <div>
                    <label for="notes" class="block text-sm uppercase tracking-widest text-brand-charcoal mb-2">Additional Notes</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Tell us about your wedding date, venue, or any specific styles you loved..." class="w-full bg-transparent border-b border-gray-300 py-2 focus:outline-none focus:border-brand-gold transition-colors font-light text-brand-charcoal resize-none"></textarea>
                </div>

                <div class="text-center pt-6">
                    <button type="submit" class="bg-brand-charcoal text-brand-ivory px-12 py-4 uppercase tracking-widest text-sm hover:bg-brand-gold transition-colors duration-300 w-full md:w-auto">
                        Request Appointment
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
